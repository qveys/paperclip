name: i18n-extract

on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/i18next.config.ts"
      - "ui/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/i18n-extract.yml"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            echo "Manifest change detected; lockfile refresh deferred to chore/refresh-lockfile."
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi

      - name: Extract i18n keys
        run: pnpm --filter @paperclipai/ui exec i18next-cli extract --config i18next.config.ts

      - name: Ensure extracted EN locale is committed
        run: |
          # Only the EN catalog is bundled at this stage of the i18n rollout
          # (see docs/i18n-rollout.md). Non-EN locales are added in PRs 29-33,
          # at which point this check expands to include them.
          if ! git diff --exit-code -- ui/src/i18n/locales/en/ || [ -n "$(git ls-files --others --exclude-standard -- ui/src/i18n/locales/en/)" ]; then
            echo "::error::EN locale files changed after extraction. Run 'pnpm --filter @paperclipai/ui exec i18next-cli extract --config i18next.config.ts' locally and commit ui/src/i18n/locales/en/ updates."
            exit 1
          fi
