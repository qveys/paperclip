# noop: retrigger checks
name: i18n-extract

on:
  pull_request:
    paths:
      - "ui/src/**"
      - "ui/i18next.config.ts"
      - "ui/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/i18n-extract.yml"

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            echo "Manifest change detected; lockfile refresh deferred to chore/refresh-lockfile."
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi

      - name: Extract i18n keys
        run: pnpm --filter @paperclipai/ui exec i18next-cli extract --config i18next.config.ts

      - name: Ensure extracted locales are committed
        run: |
          if ! git diff --exit-code -- ui/src/i18n/locales/en/ ui/src/i18n/locales/fr-FR/ ui/src/i18n/locales/de-DE/ ui/src/i18n/locales/es-ES/ ui/src/i18n/locales/ja-JP/ \
            || [ -n "$(git ls-files --others --exclude-standard -- ui/src/i18n/locales/en/ ui/src/i18n/locales/fr-FR/ ui/src/i18n/locales/de-DE/ ui/src/i18n/locales/es-ES/ ui/src/i18n/locales/ja-JP/)" ]; then
            echo "::error::Locale files changed after extraction. Run 'pnpm --filter @paperclipai/ui exec i18next-cli extract --config i18next.config.ts' locally and commit the updates."
            exit 1
          fi
