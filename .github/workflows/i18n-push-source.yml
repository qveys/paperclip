name: i18n-push-source

on:
  push:
    branches:
      - master
    paths:
      - "ui/src/i18n/locales/en/**"
      - ".github/workflows/i18n-push-source.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to upload from (ex: feat/i18n-fr-via-weblate)"
        required: false
        default: ""

jobs:
  upload-en-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pin to the triggering commit on push events so we upload the exact
          # EN catalog that fired the workflow. workflow_dispatch can override
          # with a branch/commit (e.g. backfilling from feat/i18n-fr-via-weblate).
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Weblate CLI
        run: pip install wlc

      - name: Configure Weblate token
        env:
          WEBLATE_TOKEN: ${{ secrets.WEBLATE_TOKEN }}
        run: |
          if [ -z "${WEBLATE_TOKEN:-}" ]; then
            echo "::error::WEBLATE_TOKEN secret is not configured"
            exit 1
          fi
          mkdir -p ~/.config
          # Recent wlc versions reject `key=` inside [weblate]; the token must
          # live in a [keys] section keyed by the API URL.
          {
            printf '%s\n' '[weblate]'
            printf '%s\n' 'url = https://hosted.weblate.org/api/'
            printf '\n'
            printf '%s\n' '[keys]'
            printf 'https://hosted.weblate.org/api/ = %s\n' "${WEBLATE_TOKEN}"
          } > ~/.config/weblate
          chmod 600 ~/.config/weblate

      - name: Upload English source namespaces
        run: |
          set -euo pipefail
          for ns in core dashboard issues agents plugins settings auth errors forms modals common cli projects; do
            wlc upload \
              --input "ui/src/i18n/locales/en/${ns}.json" \
              --method replace \
              "paperclip/${ns}/en"
          done
